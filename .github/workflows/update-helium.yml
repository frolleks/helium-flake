name: Update Helium Release

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-helium
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update sources.json from latest Helium release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-sources.sh

      - name: Validate flake
        run: |
          nix flake show
          nix build .#helium

      - name: Commit and push updates
        run: |
          if git diff --quiet -- sources.json; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.json
          git commit -m "Update Helium release metadata"
          git push origin HEAD:main
